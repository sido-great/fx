<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sido FX — Connecting...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#020818;
    color:#e0e8ff;
    font-family:'Rajdhani',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    flex-direction:column;
    gap:20px;
    padding:20px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');
  .logo{
    font-family:'Orbitron',monospace;
    font-size:22px;
    font-weight:900;
    background:linear-gradient(90deg,#00f5ff,#a855f7,#ff2d78);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .card{
    background:#0d1b3e;
    border:1px solid rgba(0,245,255,0.15);
    border-radius:16px;
    padding:28px 24px;
    text-align:center;
    max-width:340px;
    width:100%;
  }
  .spinner{
    width:48px;height:48px;
    border:3px solid rgba(0,245,255,0.15);
    border-top-color:#00f5ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .title{
    font-family:'Orbitron',monospace;
    font-size:14px;
    color:#00f5ff;
    margin-bottom:8px;
    letter-spacing:.5px;
  }
  .sub{font-size:13px;color:#6b7db3;line-height:1.5;}
  .status{
    font-size:12px;
    padding:10px 14px;
    border-radius:8px;
    margin-top:14px;
    background:rgba(0,245,255,0.07);
    border:1px solid rgba(0,245,255,0.15);
    color:#00f5ff;
    word-break:break-all;
  }
  .error-card{
    background:#1a0a0a;
    border-color:rgba(255,45,120,0.3);
  }
  .error-title{color:#ff2d78;}
  .error-status{
    background:rgba(255,45,120,0.07);
    border-color:rgba(255,45,120,0.2);
    color:#ff2d78;
  }
  .btn{
    display:inline-block;
    margin-top:16px;
    padding:10px 20px;
    background:linear-gradient(135deg,#00f5ff,#a855f7);
    color:#020818;
    font-family:'Orbitron',monospace;
    font-size:12px;
    font-weight:700;
    border-radius:8px;
    text-decoration:none;
    cursor:pointer;
    border:none;
  }
  .success-icon{font-size:40px;margin-bottom:10px;}
</style>
</head>
<body>

<div class="logo">⚡ SIDO FX</div>

<div class="card" id="mainCard">
  <div class="spinner" id="spinner"></div>
  <div class="title" id="cardTitle">AUTHENTICATING...</div>
  <div class="sub" id="cardSub">Processing your Deriv login.<br>Please wait a moment.</div>
  <div class="status" id="statusMsg">Reading OAuth response...</div>
</div>

<script>
(function(){
  const APP_ID = '33CP1JvyUxBxMJSzanfbT';

  // ---- helpers ----
  function qs(key){ return new URLSearchParams(window.location.search).get(key); }
  function setSuccess(msg){
    document.getElementById('spinner').style.display='none';
    document.getElementById('mainCard').insertAdjacentHTML('afterbegin','<div class="success-icon">✅</div>');
    document.getElementById('cardTitle').textContent='CONNECTED!';
    document.getElementById('cardTitle').style.color='#00ff88';
    document.getElementById('cardSub').textContent='Login successful. Returning to Sido FX...';
    document.getElementById('statusMsg').textContent=msg;
    document.getElementById('statusMsg').style.background='rgba(0,255,136,0.07)';
    document.getElementById('statusMsg').style.borderColor='rgba(0,255,136,0.2)';
    document.getElementById('statusMsg').style.color='#00ff88';
  }
  function setError(msg){
    const card=document.getElementById('mainCard');
    card.classList.add('error-card');
    document.getElementById('spinner').style.display='none';
    document.getElementById('cardTitle').textContent='AUTH ERROR';
    document.getElementById('cardTitle').classList.add('error-title');
    document.getElementById('cardSub').textContent='Something went wrong during login.';
    document.getElementById('statusMsg').textContent=msg;
    document.getElementById('statusMsg').classList.add('error-status');
    card.insertAdjacentHTML('beforeend','<a class="btn" href="SidoFX.html">← BACK TO APP</a>');
  }

  // ---- parse params ----
  const error  = qs('error');
  const code   = qs('code');
  const state  = qs('state');
  // Deriv implicit / simple OAuth delivers token directly
  const token1 = qs('token1') || qs('acct1');

  if(error){
    const desc = qs('error_description') || error;
    setError('OAuth error: ' + decodeURIComponent(desc));
    localStorage.setItem('sido_oauth_result', JSON.stringify({error: desc}));
    setTimeout(()=>{ window.location.href='SidoFX.html'; }, 3000);
    return;
  }

  // --- PKCE code flow ---
  if(code && state){
    document.getElementById('statusMsg').textContent = 'Auth code received. Exchanging for token...';
    localStorage.setItem('sido_oauth_result', JSON.stringify({code, state}));
    setSuccess(`Auth code received.\nReturning to app for token exchange...`);
    setTimeout(()=>{ window.location.href='SidoFX.html'; }, 1800);
    return;
  }

  // --- Deriv implicit / simple OAuth (token1 delivered in URL) ---
  if(token1){
    localStorage.setItem('sido_oauth_result', JSON.stringify({token1}));
    setSuccess(`Token received. Returning to Sido FX...`);
    setTimeout(()=>{ window.location.href='SidoFX.html'; }, 1500);
    return;
  }

  // --- Hash fragment fallback (some OAuth servers use fragment) ---
  const hash = new URLSearchParams(window.location.hash.replace('#',''));
  const hashToken = hash.get('access_token') || hash.get('token');
  if(hashToken){
    localStorage.setItem('sido_oauth_result', JSON.stringify({token1: hashToken}));
    setSuccess('Token from fragment. Returning...');
    setTimeout(()=>{ window.location.href='SidoFX.html'; }, 1500);
    return;
  }

  // --- Nothing matched ---
  setError('No auth code or token found in the redirect URL.\nPlease try logging in again.');
  setTimeout(()=>{ window.location.href='SidoFX.html'; }, 4000);
})();
</script>
</body>
</html>
